[tool.pytest.ini_options]
asyncio_mode   = "auto"
testpaths      = ["tests"]
pythonpath     = ["."]
log_cli        = true
log_cli_level  = "WARNING"
addopts        = "-v --tb=short"

[tool.coverage.run]
source  = ["."]
omit    = ["tests/*", "*/site-packages/*"]

[tool.coverage.report]
show_missing = true
skip_empty   = true